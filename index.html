<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>쌍뽕이네 가계부 대시보드 — 2026</title>
<style>
  :root {
    --bg: #F5F4F0;
    --surface: #FFFFFF;
    --surface-2: #F0EEE9;
    --border: #E2DFD8;
    --text-primary: #1C1B22;
    --text-secondary: #5C5B66;
    --text-muted: #9896A4;
    --spend: #E05A3A;
    --spend-light: #FAEAE5;
    --income: #3A9E71;
    --income-light: #E3F5EC;
    --save: #4B7BE5;
    --save-light: #EAF0FC;
    --card: #D4820A;
    --card-light: #FEF3C7;
    --neutral: #9896A4;
    --shadow: 0 1px 3px rgba(28,27,34,0.07), 0 0 0 1px rgba(28,27,34,0.05);
    --radius: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181E; --surface: #222229; --surface-2: #2A2A32;
      --border: #33333D; --text-primary: #F0EFE9; --text-secondary: #A8A7B4;
      --text-muted: #6A6878; --spend: #F07052; --spend-light: #2E1E18;
      --income: #4DB882; --income-light: #162B20; --save: #6A94F0;
      --save-light: #1A2240; --card: #FBBF24; --card-light: #1C1500;
      --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04);
    }
  }
  :root[data-theme="light"] {
    --bg: #F5F4F0; --surface: #FFFFFF; --surface-2: #F0EEE9;
    --border: #E2DFD8; --text-primary: #1C1B22; --text-secondary: #5C5B66;
    --text-muted: #9896A4; --spend: #E05A3A; --spend-light: #FAEAE5;
    --income: #3A9E71; --income-light: #E3F5EC; --save: #4B7BE5;
    --save-light: #EAF0FC; --card: #D4820A; --card-light: #FEF3C7;
    --shadow: 0 1px 3px rgba(28,27,34,0.07), 0 0 0 1px rgba(28,27,34,0.05);
  }
  :root[data-theme="dark"] {
    --bg: #18181E; --surface: #222229; --surface-2: #2A2A32;
    --border: #33333D; --text-primary: #F0EFE9; --text-secondary: #A8A7B4;
    --text-muted: #6A6878; --spend: #F07052; --spend-light: #2E1E18;
    --income: #4DB882; --income-light: #162B20; --save: #6A94F0;
    --save-light: #1A2240; --card: #FBBF24; --card-light: #1C1500;
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; color: var(--text-primary); white-space: nowrap; }
  .logo span { color: var(--save); }
  .period-selector {
    display: flex;
    background: var(--surface-2);
    border-radius: 6px;
    padding: 2px;
    gap: 2px;
    flex-wrap: wrap;
  }
  .period-btn {
    background: none; border: none; padding: 4px 10px; border-radius: 4px;
    cursor: pointer; font-size: 12px; color: var(--text-muted); font-family: inherit;
  }
  .period-btn.active {
    background: var(--surface); color: var(--text-primary); font-weight: 600;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .header-right { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
  .badge-sync {
    background: var(--surface-2); color: var(--text-muted);
    padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600;
  }
  .badge-sync.ok { background: var(--income-light); color: var(--income); }

  .loading-wrap {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 60vh; gap: 16px;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--save); border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-wrap {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; min-height: 60vh; gap: 8px;
  }

  .main {
    max-width: 1100px; margin: 0 auto;
    padding: 24px 24px 48px;
    display: none; flex-direction: column; gap: 20px;
  }
  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
  }
  .kpi-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; }

  /* 모바일 전용 히어로 */
  .mobile-hero { display: none; flex-direction: column; gap: 12px; margin-bottom: 12px; }
  .hero-card {
    background: linear-gradient(135deg, #4B7BE5 0%, #3455C4 100%);
    border-radius: var(--radius); padding: 22px 20px; color: #fff;
    position: relative; overflow: hidden; box-shadow: var(--shadow);
  }
  .hero-card::after {
    content: ''; position: absolute; top: -40px; right: -30px;
    width: 150px; height: 150px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .hero-label { font-size: 13px; opacity: 0.85; font-weight: 600; position: relative; }
  .hero-value {
    font-size: 34px; font-weight: 800; letter-spacing: -1px;
    margin: 4px 0 16px; font-variant-numeric: tabular-nums; position: relative;
  }
  .hero-split { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; position: relative; }
  .hero-sub { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 10px 12px; }
  .hero-sub span { font-size: 12px; opacity: 0.85; display: block; margin-bottom: 2px; }
  .hero-sub b { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .hero-budget { display: flex; align-items: center; gap: 16px; }
  .budget-ring {
    width: 76px; height: 76px; border-radius: 50%; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative;
  }
  .budget-ring::before {
    content: ''; position: absolute; inset: 8px; border-radius: 50%; background: var(--surface);
  }
  .budget-ring span { position: relative; font-size: 18px; font-weight: 800; color: var(--text-primary); }
  .budget-ring small { position: relative; font-size: 9px; color: var(--text-muted); margin-top: 1px; }
  .budget-info { flex: 1; min-width: 0; }
  .budget-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 5px; }
  .budget-line { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .budget-bar { height: 8px; background: var(--surface-2); border-radius: 4px; margin-top: 10px; overflow: hidden; }
  .budget-bar-fill { height: 100%; background: var(--spend); border-radius: 4px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
  .kpi-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 18px 20px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; gap: 6px;
  }
  .kpi-card.card-bill {
    border-top: 2px solid var(--card);
  }
  .kpi-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    color: var(--text-muted); display: flex; align-items: center; gap: 6px;
  }
  .kpi-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .kpi-value {
    font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums; line-height: 1.1;
  }
  .kpi-sub { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .kpi-sub-split { display: flex; gap: 6px; flex-wrap: wrap; }
  .kpi-sub-split span { white-space: nowrap; }

  .charts-row { display: grid; grid-template-columns: 1fr 340px; gap: 12px; align-items: stretch; }
  .card.trend-card { display: flex; flex-direction: column; }
  .card { background: var(--surface); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .card-meta { font-size: 11px; color: var(--text-muted); }

  .donut-wrap { display: flex; flex-direction: column; gap: 16px; }
  .donut-canvas-wrap { position: relative; width: 160px; height: 160px; margin: 0 auto; }
  .donut-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; pointer-events: none;
  }
  .donut-center-val {
    font-size: 18px; font-weight: 700; letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums; color: var(--text-primary);
  }
  .donut-center-label { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .legend-list { display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-name { font-size: 12px; color: var(--text-secondary); flex: 1; }
  .legend-amount { font-size: 12px; font-variant-numeric: tabular-nums; font-weight: 600; color: var(--text-primary); }
  .legend-pct { font-size: 11px; color: var(--text-muted); width: 30px; text-align: right; }

  .tx-table { width: 100%; border-collapse: collapse; }
  .tx-table th {
    font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--text-muted);
    padding: 0 0 10px; text-align: left; border-bottom: 1px solid var(--border);
  }
  .tx-table th:last-child { text-align: right; }
  .tx-table td { padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  .tx-table tr:last-child td { border-bottom: none; }
  .tx-name { color: var(--text-primary); font-weight: 500; word-break: break-word; overflow-wrap: break-word; }
  .tx-cat {
    display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
    color: var(--text-secondary); background: var(--surface-2); padding: 2px 7px; border-radius: 4px;
  }
  .tx-date { color: var(--text-muted); font-size: 12px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .tx-table td:first-child { padding-right: 12px; }
  .tx-amount { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; font-size: 13px; }
  .tx-amount.spend { color: var(--spend); }
  .tx-amount.income { color: var(--income); }
  .tx-amount.saving { color: var(--save); }

  .month-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .month-row:last-child { border-bottom: none; }
  .month-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); width: 22px; flex-shrink: 0; }
  .month-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .bar-track { height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
  .month-amounts { text-align: right; flex-shrink: 0; width: 80px; }
  .month-spend-val { font-size: 12px; font-variant-numeric: tabular-nums; font-weight: 600; color: var(--spend); }
  .month-income-val { font-size: 11px; font-variant-numeric: tabular-nums; color: var(--text-muted); }

  .bottom-row { display: grid; grid-template-columns: 1fr 340px; gap: 12px; align-items: start; }

  .surplus-pos { color: var(--income); font-weight: 700; }
  .surplus-neg { color: var(--spend); font-weight: 700; }

  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(3,1fr); }
  }
  @media (max-width: 768px) {
    .mobile-hero { display: flex; }
    .kpi-grid { display: none; }
    .kpi-grid > .kpi-card:last-child { grid-column: 1 / -1; }
    .charts-row, .bottom-row { grid-template-columns: 1fr; }
    .bottom-row .fixed-card { order: -1; }
    .header { padding: 0 16px; height: auto; min-height: 56px; flex-wrap: wrap; gap: 8px; padding: 8px 16px; }
    .main { padding: 16px 16px 48px; }
    .period-selector { width: 100%; display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; overflow: visible; }
    .period-btn { text-align: center; padding: 5px 4px; }
  }

  /* 심플·투명 스크롤바 (모바일 스타일) */
  * { scrollbar-width: thin; scrollbar-color: rgba(150,150,160,0.35) transparent; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(150,150,160,0.3); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(150,150,160,0.5); }
  ::-webkit-scrollbar-corner { background: transparent; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">쌍뽕이네 <span>가계부</span></div>
    <div class="period-selector" id="periodBtns"></div>
  </div>
  <div class="header-right">
    <span class="badge-sync" id="syncBadge">로딩 중...</span>
    <span id="lastUpdate"></span>
  </div>
</div>

<!-- Loading -->
<div class="loading-wrap" id="loadingWrap">
  <div class="spinner"></div>
  <div style="color:var(--text-muted);font-size:13px">데이터 불러오는 중...</div>
</div>

<!-- Error -->
<div class="error-wrap" id="errorWrap">
  <div style="font-size:32px">⚠️</div>
  <div style="color:var(--spend);font-weight:700;margin-top:4px">데이터 로드 실패</div>
  <div id="errorMsg" style="color:var(--text-muted);font-size:12px;margin-top:4px"></div>
  <button onclick="loadData()" style="margin-top:12px;padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-size:12px;color:var(--text-primary)">다시 시도</button>
</div>

<!-- Main -->
<div class="main" id="mainContent">
  <div>
    <!-- 모바일 전용 히어로 -->
    <div class="mobile-hero" id="mobileHero">
      <div class="hero-card">
        <div class="hero-label">이번 달 저축 여력</div>
        <div class="hero-value" id="heroSurplus">0</div>
        <div class="hero-split">
          <div class="hero-sub"><span>수입</span><b id="heroIncome">0</b></div>
          <div class="hero-sub"><span>지출</span><b id="heroExpense">0</b></div>
        </div>
      </div>
      <div class="hero-budget card">
        <div class="budget-ring" id="budgetRing"><span id="budgetPct">0%</span><small>소진</small></div>
        <div class="budget-info">
          <div class="budget-title">수입 대비 지출률</div>
          <div class="budget-line" id="budgetCount">— 건</div>
          <div class="budget-line" id="budgetFixed">고정지출 — 포함</div>
          <div class="budget-bar"><div class="budget-bar-fill" id="budgetBarFill"></div></div>
        </div>
      </div>
    </div>
    <div class="kpi-grid" id="kpiGrid"></div>
  </div>

  <div class="charts-row">
    <div class="card trend-card">
      <div class="card-header">
        <div class="card-title">월별현황</div>
        <div class="card-meta">2026년 전체</div>
      </div>
      <div id="months-list" style="flex:1; min-height:0; overflow-y:auto;"></div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">대분류별 지출</div>
        <div class="card-meta" id="donutMeta">— 기준</div>
      </div>
      <div class="donut-wrap">
        <div class="donut-canvas-wrap">
          <canvas id="donutChart" width="160" height="160"></canvas>
          <div class="donut-center">
            <div class="donut-center-val" id="donutCenterVal">0</div>
            <div class="donut-center-label">만원 지출</div>
          </div>
        </div>
        <div class="legend-list" id="legendList"></div>
      </div>
    </div>
  </div>

  <div class="bottom-row">
    <div class="card">
      <div class="card-header">
        <div class="card-title">최근 거래</div>
        <div class="card-meta" id="txMeta">최근 20건</div>
      </div>
      <div style="overflow-x:auto; overflow-y:auto; max-height:400px;">
        <table class="tx-table">
          <thead>
            <tr>
              <th>날짜</th><th>내용</th><th>분류</th><th style="text-align:right">금액</th>
            </tr>
          </thead>
          <tbody id="txBody"></tbody>
        </table>
      </div>
    </div>
    <div class="card fixed-card">
      <div class="card-header">
        <div class="card-title">고정 지출</div>
        <div class="card-meta" id="fixedMeta">이번 달</div>
      </div>
      <div id="fixedList"></div>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxkG7xzstFIlBG2dl-JD9mm3IlZNMujUZ7lr1FxcKW2PvPwt448qQourMGK3zFQPozTlw/exec';

const INCOME_CATS  = ['수입'];
const SAVING_CATS  = ['저축', '적금', '청약', '비상금', '저금'];
const CARD_METHODS = ['M본인', 'M가족'];

const CAT_COLORS = {
  '고정지출':'#6A94F0','식비':'#E05A3A','외식':'#F0A050','외식·카페':'#F0A050',
  '의료·건강':'#3A9E71','건강':'#3A9E71','교육':'#9B59B6','교통':'#9896A4','교통비':'#9896A4','쇼핑':'#E67E22',
  '생활용품':'#1ABC9C','여가':'#2ECC71','문화':'#8E44AD','통신':'#2980B9','자동차':'#F5B841',
  '가족':'#C4BEDB','기타':'#B0AEC0','⚠️확인필요':'#E84393','확인필요':'#E84393',
};
const PALETTE = ['#6A94F0','#E05A3A','#F0A050','#3A9E71','#9896A4','#C4BEDB','#9B59B6','#E67E22','#1ABC9C','#27AE60'];

let allData = [];
let selectedMonth = new Date().getMonth() + 1;

const $ = id => document.getElementById(id);

function getMonthNum(row) {
  const m = row['월'];
  if (!m) return null;
  return parseInt(String(m).replace('월',''));
}
function isIncome(r)  { return INCOME_CATS.includes(r['대분류']); }
function isSaving(r)  { return SAVING_CATS.includes(r['대분류']); }
function isExpense(r) { return !isIncome(r) && !isSaving(r); }
function isCard(r)    { return CARD_METHODS.includes(r['지출방법']); }
function fmt(n)       { return Math.round(Math.abs(Number(n))).toLocaleString(); }
function getCatColor(cat, i) { return CAT_COLORS[cat] || PALETTE[i % PALETTE.length]; }

function fmtDate(val) {
  if (!val) return '';
  const d = new Date(val);
  if (!isNaN(d.getTime())) return `${d.getMonth()+1}.${String(d.getDate()).padStart(2,'0')}`;
  const s = String(val);
  const m = s.match(/(\d+)[.\-\/](\d+)/);
  return m ? `${m[1]}.${m[2]}` : s.substring(0,5);
}

function showError(msg) {
  $('loadingWrap').style.display = 'none';
  $('errorWrap').style.display = 'flex';
  $('errorMsg').textContent = msg;
}

function loadData() {
  $('loadingWrap').style.display = 'flex';
  $('errorWrap').style.display = 'none';
  $('mainContent').style.display = 'none';

  const callbackName = '__budgetCb__' + Date.now();
  const script = document.createElement('script');

  const timer = setTimeout(function() {
    cleanup();
    showError('요청 시간 초과 (30초)');
  }, 30000);

  function cleanup() {
    clearTimeout(timer);
    delete window[callbackName];
    if (script.parentNode) script.parentNode.removeChild(script);
  }

  window[callbackName] = function(data) {
    cleanup();
    try {
      allData = data.filter(function(r) {
        return r['금액'] && r['대분류'] && Number(r['금액']) !== 0;
      });
      const months = [...new Set(allData.map(getMonthNum).filter(Boolean))].sort(function(a,b){return a-b;});
      // 카드 거래(M본인/M가족)가 있는 월 우선 — 고정지출만 있는 미래 달로 자동선택되는 것 방지
      const cardMonths = [...new Set(allData.filter(isCard).map(getMonthNum).filter(Boolean))].sort(function(a,b){return a-b;});
      const preferMonths = cardMonths.length > 0 ? cardMonths : months;
      if (!preferMonths.includes(selectedMonth) && preferMonths.length > 0) {
        selectedMonth = preferMonths[preferMonths.length - 1];
      }
      initMonthButtons(months);
      render(selectedMonth);
      $('loadingWrap').style.display = 'none';
      $('mainContent').style.display = 'flex';
      $('syncBadge').textContent = '현대카드 연동';
      $('syncBadge').className = 'badge-sync ok';
      $('lastUpdate').textContent = allData.length + '건';
    } catch(e) {
      showError(e.message);
    }
  };

  script.onerror = function() {
    cleanup();
    showError('스크립트 로드 실패 — Apps Script 배포 확인 필요');
  };

  script.src = API_URL + '?action=getData&callback=' + callbackName;
  document.head.appendChild(script);
}

function initMonthButtons(months) {
  const wrap = $('periodBtns');
  wrap.innerHTML = '';
  for (var m = 1; m <= 12; m++) {
    const btn = document.createElement('button');
    const hasData = months.includes(m);
    btn.className = 'period-btn' + (m === selectedMonth ? ' active' : '');
    if (!hasData) btn.style.opacity = '0.4';
    btn.textContent = m + '월';
    const _m = m;
    btn.onclick = function() {
      selectedMonth = _m;
      document.querySelectorAll('.period-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      render(_m);
    };
    wrap.appendChild(btn);
  }
}

function render(month) {
  const rows = allData.filter(function(r){ return getMonthNum(r) === month; });
  renderKPI(rows, month);
  renderMonthlyTrend(allData);
  renderDonut(rows, month);
  renderTransactions(rows);
  renderFixed(rows, month);
}

function renderKPI(rows, month) {
  const income  = rows.filter(isIncome).reduce(function(s,r){return s+Number(r['금액']);},0);
  const expense = rows.filter(isExpense).reduce(function(s,r){return s+Number(r['금액']);},0);
  const saving  = rows.filter(isSaving).reduce(function(s,r){return s+Number(r['금액']);},0);
  const surplus = income - expense - saving;

  // 전월 대비 지출 증감률
  const prevRows = allData.filter(function(r){ return getMonthNum(r) === month - 1; });
  const prevExpense = prevRows.filter(isExpense).reduce(function(s,r){return s+Number(r['금액']);},0);
  let expDiffHtml = '';
  if (prevExpense > 0) {
    const pct = (expense - prevExpense) / prevExpense * 100;
    const up = pct >= 0;
    expDiffHtml = ` · <span style="color:${up?'var(--spend)':'var(--income)'};font-weight:600">${up?'▲':'▼'}${Math.abs(pct).toFixed(0)}% 전월대비</span>`;
  }

  // 카드 청구 = isExpense이면서 지출방법이 M본인 or M가족인 행 합산
  const cardRows    = rows.filter(function(r){ return isExpense(r) && isCard(r); });
  const cardTotal   = cardRows.reduce(function(s,r){return s+Number(r['금액']);},0);
  const cardMe      = rows.filter(function(r){ return isExpense(r) && r['지출방법']==='M본인'; })
                          .reduce(function(s,r){return s+Number(r['금액']);},0);
  const cardFamily  = rows.filter(function(r){ return isExpense(r) && r['지출방법']==='M가족'; })
                          .reduce(function(s,r){return s+Number(r['금액']);},0);

  $('kpiGrid').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label"><div class="kpi-dot" style="background:var(--income)"></div>이번 달 수입</div>
      <div class="kpi-value" style="color:var(--income)">${fmt(income)}</div>
      <div class="kpi-sub">${rows.filter(isIncome).length}건</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><div class="kpi-dot" style="background:var(--spend)"></div>이번 달 지출</div>
      <div class="kpi-value" style="color:var(--spend)">${fmt(expense)}</div>
      <div class="kpi-sub">${rows.filter(isExpense).length}건${expDiffHtml}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><div class="kpi-dot" style="background:var(--save)"></div>저축</div>
      <div class="kpi-value" style="color:var(--save)">${fmt(saving)}</div>
      <div class="kpi-sub">${rows.filter(isSaving).length}건</div>
    </div>
    <div class="kpi-card card-bill">
      <div class="kpi-label"><div class="kpi-dot" style="background:var(--card)"></div>카드 청구 예정</div>
      <div class="kpi-value" style="color:var(--card)">${fmt(cardTotal)}</div>
      <div class="kpi-sub kpi-sub-split">
        ${cardMe     ? `<span>본인 ${(cardMe/10000).toFixed(1)}만</span>` : ''}
        ${cardFamily ? `<span>가족 ${(cardFamily/10000).toFixed(1)}만</span>` : ''}
        ${!cardTotal ? '<span>—</span>' : ''}
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><div class="kpi-dot" style="background:var(--neutral)"></div>저축률</div>
      <div class="kpi-value">${income > 0 ? (saving/income*100).toFixed(1) : 0}<span style="font-size:15px;font-weight:600;letter-spacing:0">%</span></div>
      <div class="kpi-sub">여유 <span class="${surplus>=0?'surplus-pos':'surplus-neg'}">${surplus>=0?'+':'−'}${fmt(surplus)}</span></div>
    </div>
  `;

  // ── 모바일 히어로 ──
  const heroSurplus = income - expense;
  const rate = income > 0 ? Math.min(expense / income * 100, 100) : 0;
  const reviewCount = rows.filter(function(r){ return String(r['대분류']).indexOf('확인필요') >= 0; }).length;
  const fixedTotal = rows.filter(function(r){ return r['대분류'] === '고정지출'; })
                         .reduce(function(s,r){ return s + Number(r['금액']); }, 0);
  $('heroSurplus').textContent = fmt(heroSurplus);
  $('heroIncome').textContent  = fmt(income);
  $('heroExpense').textContent = fmt(expense);
  $('budgetPct').textContent   = Math.round(rate) + '%';
  $('budgetCount').textContent = rows.length + '건 중 ⚠️ ' + reviewCount + '건 확인 필요';
  $('budgetFixed').textContent = '고정지출 ' + (fixedTotal/10000).toFixed(1) + '만 포함';
  $('budgetBarFill').style.width = rate + '%';
  $('budgetRing').style.background =
    'conic-gradient(var(--spend) 0% ' + rate + '%, var(--surface-2) ' + rate + '% 100%)';
}

function renderMonthlyTrend(allRows) {
  // 카드 거래(M본인/M가족)가 있는 마지막 월까지만 — 고정지출만 예약된 미래 달 제외
  const cardMonths = [...new Set(allRows.filter(isCard).map(getMonthNum).filter(Boolean))];
  const maxMonth = cardMonths.length > 0 ? Math.max.apply(null, cardMonths) : (new Date().getMonth() + 1);
  const monthNums = [...new Set(allRows.map(getMonthNum).filter(Boolean))]
    .filter(function(m){ return m <= maxMonth; })
    .sort(function(a,b){return b-a;});
  const list = $('months-list');
  list.innerHTML = '';
  const monthData = monthNums.map(function(m) {
    const rows = allRows.filter(function(r){ return getMonthNum(r) === m; });
    return {
      label: m+'월',
      income: rows.filter(isIncome).reduce(function(s,r){return s+Number(r['금액']);},0),
      spend:  rows.filter(isExpense).reduce(function(s,r){return s+Number(r['금액']);},0),
    };
  });
  const maxVal = Math.max.apply(null, monthData.map(function(m){return Math.max(m.income,m.spend);}));
  const maxSafe = maxVal || 1;
  monthData.forEach(function(m) {
    const incPct = (m.income/maxSafe*100).toFixed(1);
    const spPct  = (m.spend /maxSafe*100).toFixed(1);
    const row = document.createElement('div');
    row.className = 'month-row';
    row.innerHTML = `
      <div class="month-label">${m.label}</div>
      <div class="month-bars">
        <div class="bar-track"><div class="bar-fill" style="width:${incPct}%;background:var(--income);opacity:.55"></div></div>
        <div class="bar-track"><div class="bar-fill" style="width:${spPct}%;background:var(--spend)"></div></div>
      </div>
      <div class="month-amounts">
        <div class="month-income-val">수입 ${(m.income/10000).toFixed(0)}만</div>
        <div class="month-spend-val">${(m.spend/10000).toFixed(0)}만</div>
      </div>
    `;
    list.appendChild(row);
  });
}

function renderDonut(rows, month) {
  $('donutMeta').textContent = month + '월 기준';
  const expenses = rows.filter(isExpense);
  const catMap = {};
  expenses.forEach(function(r) {
    const cat = r['대분류'] || '기타';
    catMap[cat] = (catMap[cat]||0) + Number(r['금액']);
  });
  const categories = Object.entries(catMap).sort(function(a,b){return b[1]-a[1];}).map(function(entry,i){
    return { name: entry[0], amount: entry[1], color: getCatColor(entry[0],i) };
  });
  const total = categories.reduce(function(s,c){return s+c.amount;},0);
  $('donutCenterVal').textContent = (total/10000).toFixed(0);

  const canvas = $('donutChart');
  const dpr = window.devicePixelRatio||1;
  canvas.width=160*dpr; canvas.height=160*dpr;
  canvas.style.width='160px'; canvas.style.height='160px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const cx=80,cy=80,r=64,inner=42;
  const isDark = document.documentElement.getAttribute('data-theme')==='dark' ||
    (!document.documentElement.getAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const bg = isDark ? '#222229' : '#FFFFFF';
  let angle = -Math.PI/2;

  if (!categories.length) {
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle = isDark?'#2A2A32':'#F0EEE9'; ctx.fill();
  } else {
    categories.forEach(function(cat) {
      const slice = (cat.amount/total)*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,angle,angle+slice);
      ctx.closePath(); ctx.fillStyle=cat.color; ctx.fill();
      ctx.strokeStyle=bg; ctx.lineWidth=2; ctx.stroke();
      angle+=slice;
    });
  }
  ctx.beginPath(); ctx.arc(cx,cy,inner,0,Math.PI*2);
  ctx.fillStyle=bg; ctx.fill();

  const legendEl = $('legendList');
  legendEl.innerHTML = '';
  categories.slice(0,7).forEach(function(cat) {
    const pct = total ? ((cat.amount/total)*100).toFixed(0) : 0;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <div class="legend-swatch" style="background:${cat.color}"></div>
      <div class="legend-name">${cat.name}</div>
      <div class="legend-amount">${fmt(cat.amount)}</div>
      <div class="legend-pct">${pct}%</div>
    `;
    legendEl.appendChild(item);
  });
}

function renderTransactions(rows) {
  const sorted = [...rows].sort(function(a,b){return new Date(b['날짜'])-new Date(a['날짜']);});
  const meta = $('txMeta'); if (meta) meta.textContent = '전체 ' + sorted.length + '건';
  const tbody = $('txBody');
  tbody.innerHTML = '';
  sorted.forEach(function(tx) {
    const inc = isIncome(tx);
    const sav = isSaving(tx);
    const cls = inc ? 'income' : sav ? 'saving' : 'spend';
    const sign = (inc || sav) ? '+' : '';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="tx-date">${fmtDate(tx['날짜'])}</td>
      <td><div class="tx-name">${tx['내용']||''}</div></td>
      <td><span class="tx-cat">${tx['대분류']||''}</span></td>
      <td class="tx-amount ${cls}">${sign}${fmt(tx['금액'])}</td>
    `;
    tbody.appendChild(tr);
  });
}

function renderFixed(rows, month) {
  $('fixedMeta').textContent = month + '월';
  const fixedRows = rows.filter(function(r){ return r['대분류'] === '고정지출'; });
  const cardTotal = rows.filter(function(r){ return isExpense(r) && isCard(r); })
                        .reduce(function(s,r){ return s + Number(r['금액']); }, 0);
  const el = $('fixedList');
  el.innerHTML = '';
  if (!fixedRows.length && !cardTotal) {
    el.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:12px 0">고정지출 항목 없음</div>';
    return;
  }
  let total = 0;

  // 현대카드 결제 (카드 청구 예정 합계)
  if (cardTotal > 0) {
    total += cardTotal;
    const cardRow = document.createElement('div');
    cardRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)';
    cardRow.innerHTML = `
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--card)">💳 현대카드 결제</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:1px">매월 17일 (변동)</div>
      </div>
      <div style="font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--card);flex-shrink:0">${fmt(cardTotal)}</div>
    `;
    el.appendChild(cardRow);
  }

  fixedRows.forEach(function(f) {
    total += Number(f['금액']);
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)';
    row.innerHTML = `
      <div>
        <div style="font-size:13px;font-weight:500;color:var(--text-primary)">${f['내용']||''}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:1px">${f['소분류']||''}</div>
      </div>
      <div style="font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--spend);flex-shrink:0">${fmt(f['금액'])}</div>
    `;
    el.appendChild(row);
  });
  const sumRow = document.createElement('div');
  sumRow.style.cssText = 'display:flex;justify-content:space-between;padding:12px 0 0;border-top:2px solid var(--border);margin-top:4px';
  sumRow.innerHTML = `
    <div style="font-size:12px;font-weight:700;color:var(--text-muted)">월 합계 (카드 포함)</div>
    <div style="font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--spend)">${total.toLocaleString()}</div>
  `;
  el.appendChild(sumRow);
}

const obs = new MutationObserver(function() {
  const rows = allData.filter(function(r){ return getMonthNum(r) === selectedMonth; });
  if (rows.length) renderDonut(rows, selectedMonth);
});
obs.observe(document.documentElement, {attributes:true, attributeFilter:['data-theme']});
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', function() {
  const rows = allData.filter(function(r){ return getMonthNum(r) === selectedMonth; });
  if (rows.length) renderDonut(rows, selectedMonth);
});

loadData();
</script>
</body>
</html>
